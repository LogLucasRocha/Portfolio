<!DOCTYPE html>
<html>

<head>
  <title>Flexbox Pricing Table</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Sono', sans-serif;
      background-color: #865DFF;
    }
    
    .pricing-container{
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 30px;
      gap: 15px;
      height: 100vh;
    }

    .pricing-plan{
      flex-basis: 350px;
      min-height: 300px;
      background-color: #191825;
      border-radius: 20px;
      text-align: center;
      color: #ff86fd;
    }

    .plan-title{
      display: inline-block;
      width: 250px;
      border-radius: 20px;
      margin-top: 20px;
      font-weight: bold;
      color: white;
      background: linear-gradient(90deg,#191825,#865DFF, #FFA3FD);
      font-size: 1.3rem;
    }

    .plan-price{
      margin-top: 10px;
      font-weight: bold;
      font-size: 1.5rem;
    }

    .plan-features{
      display: flex;
      flex-direction: column;
      list-style: none;
      padding: 0;
      gap: 10px;
    }

    .plan-button{
      margin-top: 15px;
      height: 40px;
      width: 100px;
      color: #865DFF;
      font-size: 1rem;
      background-color: #191825;
      border: 2px solid #865DFF;
      border-radius: 10px;
    }
    /* Hint: What can you do with a media query and flexbox? */
    @media (max-width: 1250px) {
      .pricing-container{
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }
      
    .pricing-plan{
      min-width: 350px;
      max-height: 300px;
    }

    }
  </style>
</head>

<body>
  <div class="pricing-container">
    <div class="pricing-plan">
      <div class="plan-title">Basic</div>
      <div class="plan-price">$9.99/month</div>
      <ul class="plan-features">
        <li>💜 10GB Storage</li>
        <li>💜  1 User</li>
        <li>⛔ Support</li>
      </ul>
      <button class="plan-button">Sign Up</a>
    </div>
    <div class="pricing-plan">
      <div class="plan-title">Standard</div>
      <div class="plan-price">$19.99/month</div>
      <ul class="plan-features">
        <li>💜 50GB Storage</li>
        <li>💜 5 Users</li>
        <li>💜 Phone &amp; Email Support</li>
      </ul>
      <button class="plan-button">Sign Up</a>
    </div>
    <div class="pricing-plan">
      <div class="plan-title">Premium</div>
      <div class="plan-price">$49.99/month</div>
      <ul class="plan-features">
        <li>💜 100GB Storage</li>
        <li>💜 10 Users</li>
        <li>💜 24/7 Support</li>
      </ul>
      <button class="plan-button">Sign Up</a>
    </div>
  </div>

</body>

</html>
